<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stats Carousel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Impact, 'Arial Narrow', Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }

  .wrap {
    position: relative;
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .scene {
    width: 480px;
    height: 280px;
    perspective: 900px;
    perspective-origin: 50% 50%;
  }

  .carousel {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
  }

  .card {
    position: absolute;
    width: 440px;
    height: 240px;
    left: 50%;
    top: 50%;
    margin-left: -220px;
    margin-top: -120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    border-radius: 20px;
    padding: 32px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backface-visibility: hidden;
  }

  .card__number {
    font-size: 86px;
    line-height: 1;
    letter-spacing: -3px;
  }

  .card__label {
    font-size: 17px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 12px;
    color: rgba(255,255,255,0.5);
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-weight: 700;
  }

  .card--0 .card__number { color: #4ea8ff; }
  .card--1 .card__number { color: #f5c842; }
  .card--2 .card__number { color: #4ecf7a; }

  .arrow {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .arrow:hover { background: rgba(255,255,255,0.2); }

  .dots {
    position: absolute;
    bottom: -36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s;
  }
  .dot.active { background: #fff; }
</style>
</head>
<body>

<div class="wrap">
  <button class="arrow" id="prev">&#8592;</button>
  <div style="position:relative;">
    <div class="scene">
      <div class="carousel" id="carousel"></div>
    </div>
    <div class="dots" id="dots"></div>
  </div>
  <button class="arrow" id="next">&#8594;</button>
</div>

<script>
  const stats = [
    { number: '4B+', label: 'Media Assets Generated' },
    { number: '16',  label: 'Industries Empowered'   },
    { number: '235', label: 'Countries & Territories' },
  ];

  const N         = stats.length;
  const angleStep = 360 / N;
  const radius    = 220;

  const carouselEl = document.getElementById('carousel');
  const dotsEl     = document.getElementById('dots');

  stats.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = `card card--${i}`;
    card.innerHTML = `<div class="card__number">${s.number}</div><div class="card__label">${s.label}</div>`;
    card.style.transform = `rotateY(${angleStep * i}deg) translateZ(${radius}px)`;
    carouselEl.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot';
    dotsEl.appendChild(dot);
  });

  let angle    = 0;
  let autoOn   = true;
  let dragOn   = false;
  let dragX    = 0;
  let dragBase = 0;

  function activeIdx() {
    return Math.round(((-angle % 360) + 360) % 360 / angleStep) % N;
  }

  function render() {
    carouselEl.style.transform = `rotateY(${angle}deg)`;
    const idx = activeIdx();
    dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  }

  (function loop() {
    if (autoOn && !dragOn) angle -= 0.2;
    render();
    requestAnimationFrame(loop);
  })();

  function pauseAuto() {
    autoOn = false;
    clearTimeout(window._autoResume);
    window._autoResume = setTimeout(() => autoOn = true, 2000);
  }

  document.getElementById('prev').addEventListener('click', () => { angle += angleStep; pauseAuto(); });
  document.getElementById('next').addEventListener('click', () => { angle -= angleStep; pauseAuto(); });

  carouselEl.addEventListener('mousedown',  e => { dragOn = true; dragX = e.clientX; dragBase = angle; pauseAuto(); });
  window.addEventListener('mousemove',      e => { if (dragOn) angle = dragBase + (e.clientX - dragX) * 0.5; });
  window.addEventListener('mouseup',        ()  => { dragOn = false; });

  carouselEl.addEventListener('touchstart', e => { dragOn = true; dragX = e.touches[0].clientX; dragBase = angle; pauseAuto(); }, { passive: true });
  window.addEventListener('touchmove',      e => { if (dragOn) angle = dragBase + (e.touches[0].clientX - dragX) * 0.5; }, { passive: true });
  window.addEventListener('touchend',       ()  => { dragOn = false; });
</script>
</body>
</html>
